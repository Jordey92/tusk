      retries: 5

  # PostgreSQL 16
  postgres-16:
    image: postgres:16-alpine
    container_name: tusk-test-pg16
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: migrate_tool_test
    ports:
      - "5435:5432"
    volumes:
      - pg16-data:/var/lib/postgresql/data
