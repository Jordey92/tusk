      retries: 5

  # PostgreSQL 17 (latest)
  postgres-17:
    image: postgres:17-alpine
    container_name: tusk-test-pg17
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: migrate_tool_test
    ports:
      - "5436:5432"
