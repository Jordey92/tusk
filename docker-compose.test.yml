      - pg17-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d migrate_tool_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg13-data:
  pg14-data:
  pg15-data:
  pg16-data:
  pg17-data:
