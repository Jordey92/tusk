# Docker Compose for testing Tusk against multiple PostgreSQL versions
# Usage: docker-compose -f docker-compose.test.yml up <service-name>

services:
  # PostgreSQL 13 (minimum supported)
  postgres-13:
    image: postgres:13-alpine
    container_name: tusk-test-pg13
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: migrate_tool_test
    ports:
      - "5432:5432"
    volumes:
      - pg13-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d migrate_tool_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL 14
  postgres-14:
    image: postgres:14-alpine
    container_name: tusk-test-pg14
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: migrate_tool_test
    ports:
      - "5433:5432"
    volumes:
      - pg14-data:/var/lib/postgresql/data
