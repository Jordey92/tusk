services:
  db:
    image: postgres:18-bookworm
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: migrate_tool_test
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user", "-d", "migrate_tool_test"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
