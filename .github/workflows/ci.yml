name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-modern:
    name: Verify (Node 24, PostgreSQL 18)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:18.3-bookworm
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: migrate_tool_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U user -d migrate_tool_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://user:password@127.0.0.1:5433/migrate_tool_test
      DB_HOST: 127.0.0.1
      DB_PORT: 5433
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: migrate_tool_test

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.8

      - name: Restore Bun cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI verification
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/verify-modern
          bun run test:ci 2>&1 | tee artifacts/verify-modern/test-ci.log

      - name: Run release-quality verification
        shell: bash
        run: |
          set -o pipefail
          bun run quality:release 2>&1 | tee artifacts/verify-modern/quality-release.log

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: verify-modern-logs
          path: |
            artifacts/verify-modern
            .tmp
            coverage
          if-no-files-found: ignore
          retention-days: 14

  minimum-supported:
    uses: ./.github/workflows/reusable-package-smoke.yml
    with:
      job_name: Minimum Support (Node 18, PostgreSQL 13)
      node_version: "18"
      postgres_image: postgres:13.23-bookworm
      artifact_name: minimum-supported-logs
