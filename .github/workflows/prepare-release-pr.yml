name: Prepare Release PR

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "How to determine the next version"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: "Explicit version to prepare when release_type is custom"
        required: false
        type: string

concurrency:
  group: release-pr-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: release-preparation

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Ensure workflow runs from default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "Run release preparation from ${DEFAULT_BRANCH}, not ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.8

      - name: Determine release version
        id: version
        shell: bash
        env:
          CUSTOM_VERSION: ${{ inputs.custom_version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          current_version="$(node -p "require('./package.json').version")"
          echo "Current version: ${current_version}"

          case "${RELEASE_TYPE}" in
            patch|minor|major)
              npm version "${RELEASE_TYPE}" --no-git-tag-version
              next_version="$(node -p "require('./package.json').version")"
              ;;
            custom)
              if [ -z "${CUSTOM_VERSION}" ]; then
                echo "custom_version is required when release_type is custom"
                exit 1
              fi
              npm version "${CUSTOM_VERSION}" --no-git-tag-version
              next_version="$(node -p "require('./package.json').version")"
              ;;
            *)
              echo "Unsupported release type: ${RELEASE_TYPE}"
              exit 1
              ;;
          esac

          bun scripts/validate-release-version.ts "${current_version}" "${next_version}"
          npm pkg set "dependencies.@bydey/tusk=^${next_version}" --prefix examples/basic

          tag="v${next_version}"
          branch="release/${tag}"

          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}$"; then
            echo "Tag ${tag} already exists on origin"
            exit 1
          fi

          if git ls-remote --heads origin "refs/heads/${branch}" | grep -q "${branch}$"; then
            echo "Release branch ${branch} already exists on origin"
            exit 1
          fi

          if gh pr list --base "${DEFAULT_BRANCH}" --head "${branch}" --state open --json number --jq 'length > 0' | grep -q true; then
            echo "An open release PR for ${branch} already exists"
            exit 1
          fi

          {
            echo "version=${next_version}"
            echo "tag=${tag}"
            echo "branch=${branch}"
          } >> "$GITHUB_OUTPUT"

      - name: Commit release branch
        env:
          RELEASE_BRANCH: ${{ steps.version.outputs.branch }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "${RELEASE_BRANCH}"
          git add package.json examples/basic/package.json
          git commit -m "chore(release): prepare ${RELEASE_TAG}"

      - name: Push release branch
        env:
          RELEASE_BRANCH: ${{ steps.version.outputs.branch }}
        run: git push -u origin "${RELEASE_BRANCH}"

      - name: Open release pull request
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: ${{ steps.version.outputs.branch }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          body_file="$(mktemp)"
          printf '%s\n' \
            '## Summary' \
            "- prepare \`${RELEASE_TAG}\` for release" \
            "- bump \`package.json\` from the current published line to \`${RELEASE_VERSION}\`" \
            '' \
            '## Next Step' \
            '- merge this PR after CI passes' \
            "- run the \`Publish npm Release\` workflow from \`${DEFAULT_BRANCH}\`" \
            > "${body_file}"

          gh pr create \
            --base "${DEFAULT_BRANCH}" \
            --head "${RELEASE_BRANCH}" \
            --title "chore(release): prepare ${RELEASE_TAG}" \
            --body-file "${body_file}"

      - name: Dispatch required release-branch checks
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: ${{ steps.version.outputs.branch }}
        run: |
          gh workflow run ci.yml --ref "${RELEASE_BRANCH}"
          gh workflow run package-platforms.yml --ref "${RELEASE_BRANCH}"
