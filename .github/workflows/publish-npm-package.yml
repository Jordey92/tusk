name: Publish npm Release

on:
  workflow_dispatch:
    inputs:
      create_github_release:
        description: "Create a GitHub release for the published tag"
        required: true
        default: true
        type: boolean

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  compatibility:
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-package-smoke.yml
    with:
      job_name: Minimum Support Verification (Node 18, PostgreSQL 13)
      node_version: "18"
      postgres_image: postgres:13.23-bookworm
      artifact_name: release-minimum-supported-logs

  release:
    needs: compatibility
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.3-bookworm
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: migrate_tool_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U user -d migrate_tool_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure workflow runs from default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "Run releases from ${DEFAULT_BRANCH}, not ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js for npm
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine release version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          release_notes_file="docs/releases/${tag}.md"

          if [ ! -f "${release_notes_file}" ]; then
            echo "Missing release notes: ${release_notes_file}"
            echo "Add human-written release notes before publishing."
            exit 1
          fi

          if grep -Eiq 'TODO|TBD|FIXME' "${release_notes_file}"; then
            echo "Release notes still contain placeholder markers: ${release_notes_file}"
            exit 1
          fi

          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}$"; then
            echo "Tag ${tag} already exists on origin"
            exit 1
          fi

          if npm view @bydey/tusk@"${version}" version >/dev/null 2>&1; then
            echo "Version ${version} already exists on npm"
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_notes_file=${release_notes_file}" >> "$GITHUB_OUTPUT"

      - name: Run CI verification
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/release
          bun run test:ci 2>&1 | tee artifacts/release/test-ci.log
        env:
          DATABASE_URL: postgresql://user:password@127.0.0.1:5433/migrate_tool_test
          DB_HOST: 127.0.0.1
          DB_PORT: 5433
          DB_USER: user
          DB_PASSWORD: password
          DB_NAME: migrate_tool_test

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-logs
          path: |
            artifacts/release
            .tmp
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: ${{ github.event.inputs.create_github_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file "${{ steps.version.outputs.release_notes_file }}" \
            --latest
