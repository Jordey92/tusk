name: Release and Publish npm Package

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "How to determine the next version"
        required: true
        default: "as-is"
        type: choice
        options:
          - as-is
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: "Explicit version to publish when release_type is custom"
        required: false
        type: string
      create_github_release:
        description: "Create a GitHub release for the published tag"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-bookworm
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: migrate_tool_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U user -d migrate_tool_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure workflow runs from default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "Run releases from ${DEFAULT_BRANCH}, not ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js for npm
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine release version
        id: version
        shell: bash
        run: |
          release_type="${{ github.event.inputs.release_type }}"
          custom_version="${{ github.event.inputs.custom_version }}"

          current_version="$(node -p "require('./package.json').version")"
          echo "Current version: ${current_version}"

          case "${release_type}" in
            as-is)
              next_version="${current_version}"
              ;;
            patch|minor|major)
              npm version "${release_type}" --no-git-tag-version
              next_version="$(node -p "require('./package.json').version")"
              ;;
            custom)
              if [ -z "${custom_version}" ]; then
                echo "custom_version is required when release_type is custom"
                exit 1
              fi
              npm version "${custom_version}" --no-git-tag-version
              next_version="$(node -p "require('./package.json').version")"
              ;;
            *)
              echo "Unsupported release type: ${release_type}"
              exit 1
              ;;
          esac

          tag="v${next_version}"
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}$"; then
            echo "Tag ${tag} already exists on origin"
            exit 1
          fi

          echo "version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: bun run build

      - name: Run test suite
        run: bun test
        env:
          DATABASE_URL: postgresql://user:password@127.0.0.1:5433/migrate_tool_test
          DB_HOST: 127.0.0.1
          DB_PORT: 5433
          DB_USER: user
          DB_PASSWORD: password
          DB_NAME: migrate_tool_test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump if needed
        shell: bash
        run: |
          if git diff --quiet -- package.json; then
            echo "package.json already at release version"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): publish ${{ steps.version.outputs.tag }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: ${{ github.event.inputs.create_github_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --latest
