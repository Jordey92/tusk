name: Reusable Package Smoke

on:
  workflow_call:
    inputs:
      job_name:
        required: true
        type: string
      node_version:
        required: true
        type: string
      postgres_image:
        required: true
        type: string
      artifact_name:
        required: true
        type: string

permissions:
  contents: read

jobs:
  package-smoke:
    name: ${{ inputs.job_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: ${{ inputs.postgres_image }}
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: migrate_tool_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U user -d migrate_tool_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TUSK_SMOKE_DATABASE_URL: postgresql://user:password@127.0.0.1:5433/migrate_tool_test

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.8

      - name: Restore Bun cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run package smoke test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/package-smoke
          bun run test:smoke:package 2>&1 | tee artifacts/package-smoke/package-smoke.log

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            artifacts/package-smoke
            .tmp
          if-no-files-found: ignore
          retention-days: 14
