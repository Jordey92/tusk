name: Reusable Package Smoke

on:
  workflow_call:
    inputs:
      job_name:
        required: true
        type: string
      node_version:
        required: true
        type: string
      postgres_image:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      timeout_minutes:
        required: false
        type: number
        default: 15

permissions:
  contents: read

jobs:
  package-smoke:
    name: ${{ inputs.job_name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}

    services:
      postgres:
        image: ${{ inputs.postgres_image }}
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: migrate_tool_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U user -d migrate_tool_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TUSK_SMOKE_DATABASE_URL: postgresql://user:password@127.0.0.1:5433/migrate_tool_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run package smoke test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/package-smoke
          bun test package-smoke.test.ts 2>&1 | tee artifacts/package-smoke/package-smoke.log

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            artifacts/package-smoke
            .tmp
          if-no-files-found: ignore
          retention-days: 14
