name: Hosted Provider Evidence

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Guarded disposable PostgreSQL provider
        required: true
        type: choice
        options:
          - neon
          - supabase
          - rds
          - aurora
      confirmation:
        description: Type RUN DISPOSABLE followed by the selected provider
        required: true
        type: string
      candidate_run_id:
        description: Optional earlier hosted-evidence run whose exact tarball should be reused
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: hosted-provider-evidence-${{ inputs.provider }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Secret-free preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    env:
      CONFIRMATION: ${{ inputs.confirmation }}
      PROVIDER: ${{ inputs.provider }}
    steps:
      - name: Require main and exact disposable confirmation
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Hosted release evidence must run from main"
            exit 1
          fi
          if [ "${CONFIRMATION}" != "RUN DISPOSABLE ${PROVIDER}" ]; then
            echo "Confirmation must be exactly: RUN DISPOSABLE ${PROVIDER}"
            exit 1
          fi

  verify:
    name: Verify ${{ inputs.provider }}
    needs: preflight
    runs-on: ${{ (inputs.provider == 'rds' || inputs.provider == 'aurora') && fromJSON('["self-hosted","linux","tusk-hosted-postgres"]') || 'ubuntu-24.04' }}
    timeout-minutes: 5
    environment: hosted-pg-${{ inputs.provider }}

    steps:
      - name: Establish cleanup-safe verification deadline
        shell: bash
        run: |
          set -euo pipefail
          echo "TUSK_HOSTED_VERIFY_DEADLINE_EPOCH=$(($(date +%s) + 210))" >> "${GITHUB_ENV}"

      - name: Validate protected target configuration
        shell: bash
        env:
          TUSK_HOSTED_DATABASE_URL: ${{ secrets.HOSTED_DATABASE_URL }}
          TUSK_HOSTED_EXPECTED_DATABASE: ${{ vars.EXPECTED_DATABASE }}
          TUSK_HOSTED_EXPECTED_DOCTOR_PROVIDER: ${{ vars.EXPECTED_DOCTOR_PROVIDER }}
          TUSK_HOSTED_EXPECTED_HOST_SUFFIX: ${{ vars.EXPECTED_HOST_SUFFIX }}
          TUSK_HOSTED_GUARD_TOKEN: ${{ secrets.HOSTED_GUARD_TOKEN }}
          TUSK_HOSTED_REGION: ${{ vars.PROVIDER_REGION }}
          TUSK_HOSTED_TARGET_LABEL: ${{ vars.TARGET_LABEL }}
        run: |
          set -euo pipefail
          required=(
            TUSK_HOSTED_DATABASE_URL
            TUSK_HOSTED_EXPECTED_DATABASE
            TUSK_HOSTED_EXPECTED_DOCTOR_PROVIDER
            TUSK_HOSTED_EXPECTED_HOST_SUFFIX
            TUSK_HOSTED_GUARD_TOKEN
            TUSK_HOSTED_REGION
            TUSK_HOSTED_TARGET_LABEL
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Protected environment value ${name} is not configured"
              exit 1
            fi
          done

      - name: Check out the evidence commit
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js for package verification
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Set up pinned npm CLI
        run: npm install --global npm@12.0.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.8

      - name: Validate runner toolchain
        shell: bash
        run: |
          set -euo pipefail
          required=(awk bash date find gh git jq node npm realpath sha256sum tar timeout)
          for tool in "${required[@]}"; do
            if ! command -v "${tool}" >/dev/null 2>&1; then
              echo "Required runner tool is missing: ${tool}"
              exit 1
            fi
          done
          if [ "${BASH_VERSINFO[0]}" -lt 4 ]; then
            echo "Bash 4 or newer is required"
            exit 1
          fi

      - name: Install verifier dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Prepare immutable candidate tarball
        id: candidate
        shell: bash
        env:
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/hosted .tmp/candidate-source .tmp/hosted-consumer

          if [ -n "${CANDIDATE_RUN_ID}" ]; then
            if ! [[ "${CANDIDATE_RUN_ID}" =~ ^[0-9]+$ ]]; then
              echo "candidate_run_id must be numeric"
              exit 1
            fi
            candidate_run="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${CANDIDATE_RUN_ID}")"
            candidate_sha="$(jq -r .head_sha <<<"${candidate_run}")"
            candidate_attempt="$(jq -r .run_attempt <<<"${candidate_run}")"
            if [ "${candidate_sha}" != "${GITHUB_SHA}" ]; then
              echo "Candidate run used ${candidate_sha}; expected ${GITHUB_SHA}"
              exit 1
            fi
            if ! [[ "${candidate_attempt}" =~ ^[1-9][0-9]*$ ]]; then
              echo "Candidate run ${CANDIDATE_RUN_ID} has an invalid run attempt"
              exit 1
            fi
            if [ "$(jq -r .conclusion <<<"${candidate_run}")" != "success" ] || \
               [ "$(jq -r .path <<<"${candidate_run}")" != ".github/workflows/hosted-provider-evidence.yml" ]; then
              echo "Candidate run must be a successful hosted-provider evidence workflow"
              exit 1
            fi
            gh run download "${CANDIDATE_RUN_ID}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "hosted-candidate-*-${CANDIDATE_RUN_ID}-${candidate_attempt}" \
              --dir .tmp/candidate-source >/dev/null
            mapfile -t candidates < <(find .tmp/candidate-source -type f -name '*.tgz')
            if [ "${#candidates[@]}" -ne 1 ]; then
              echo "Expected exactly one candidate tarball in run ${CANDIDATE_RUN_ID}"
              exit 1
            fi
            cp "${candidates[0]}" artifacts/hosted/
          else
            bun run build
            npm pack --ignore-scripts --pack-destination artifacts/hosted >/tmp/tusk-hosted-tarball-name
          fi

          mapfile -t tarballs < <(find artifacts/hosted -maxdepth 1 -type f -name '*.tgz')
          if [ "${#tarballs[@]}" -ne 1 ]; then
            echo "Expected exactly one prepared candidate tarball"
            exit 1
          fi
          tarball="$(realpath "${tarballs[0]}")"
          tarball_sha="$(sha256sum "${tarball}" | awk '{print $1}')"

          cd .tmp/hosted-consumer
          npm init -y >/dev/null
          npm install \
            --ignore-scripts \
            --no-audit \
            --no-fund \
            --no-package-lock \
            "${tarball}" \
            'pg@8.16.3'
          cli_path="$(realpath node_modules/.bin/tusk)"

          echo "tarball=${tarball}" >> "${GITHUB_OUTPUT}"
          echo "tarball_sha=${tarball_sha}" >> "${GITHUB_OUTPUT}"
          echo "cli_path=${cli_path}" >> "${GITHUB_OUTPUT}"

      - name: Verify exact candidate against guarded provider
        shell: bash
        env:
          ARTIFACT_PATH: ${{ steps.candidate.outputs.tarball }}
          CLI_PATH: ${{ steps.candidate.outputs.cli_path }}
          EVIDENCE_OUTPUT: artifacts/hosted/evidence-${{ inputs.provider }}-${{ github.run_id }}-${{ github.run_attempt }}.json
          PROVIDER: ${{ inputs.provider }}
          TUSK_HOSTED_CLEANUP_MANIFEST: ${{ github.workspace }}/.tmp/hosted-cleanup.json
          TUSK_HOSTED_CONFIRM_DISPOSABLE: ${{ inputs.confirmation }}
          TUSK_HOSTED_DATABASE_URL: ${{ secrets.HOSTED_DATABASE_URL }}
          TUSK_HOSTED_EXPECTED_DATABASE: ${{ vars.EXPECTED_DATABASE }}
          TUSK_HOSTED_EXPECTED_DOCTOR_PROVIDER: ${{ vars.EXPECTED_DOCTOR_PROVIDER }}
          TUSK_HOSTED_EXPECTED_HOST_SUFFIX: ${{ vars.EXPECTED_HOST_SUFFIX }}
          TUSK_HOSTED_GUARD_TOKEN: ${{ secrets.HOSTED_GUARD_TOKEN }}
          TUSK_HOSTED_REGION: ${{ vars.PROVIDER_REGION }}
          TUSK_HOSTED_RUN_ID: tusk_v1_${{ github.run_id }}_${{ github.run_attempt }}
          TUSK_HOSTED_TARGET_LABEL: ${{ vars.TARGET_LABEL }}
        run: |
          set -euo pipefail
          remaining_seconds=$((TUSK_HOSTED_VERIFY_DEADLINE_EPOCH - $(date +%s)))
          if [ "${remaining_seconds}" -lt 30 ]; then
            echo "Insufficient time remains to start guarded provider verification"
            exit 1
          fi
          timeout --signal=TERM --kill-after=5s "${remaining_seconds}s" \
            bun scripts/verify-hosted-provider.ts \
            --provider "${PROVIDER}" \
            --cli "${CLI_PATH}" \
            --artifact "${ARTIFACT_PATH}" \
            --output "${EVIDENCE_OUTPUT}"

      - name: Re-run guarded cleanup
        if: always()
        shell: bash
        env:
          PROVIDER: ${{ inputs.provider }}
          TUSK_HOSTED_CLEANUP_MANIFEST: ${{ github.workspace }}/.tmp/hosted-cleanup.json
          TUSK_HOSTED_CONFIRM_DISPOSABLE: ${{ inputs.confirmation }}
          TUSK_HOSTED_DATABASE_URL: ${{ secrets.HOSTED_DATABASE_URL }}
          TUSK_HOSTED_EXPECTED_DATABASE: ${{ vars.EXPECTED_DATABASE }}
          TUSK_HOSTED_EXPECTED_DOCTOR_PROVIDER: ${{ vars.EXPECTED_DOCTOR_PROVIDER }}
          TUSK_HOSTED_EXPECTED_HOST_SUFFIX: ${{ vars.EXPECTED_HOST_SUFFIX }}
          TUSK_HOSTED_GUARD_TOKEN: ${{ secrets.HOSTED_GUARD_TOKEN }}
          TUSK_HOSTED_REGION: ${{ vars.PROVIDER_REGION }}
          TUSK_HOSTED_RUN_ID: tusk_v1_${{ github.run_id }}_${{ github.run_attempt }}
          TUSK_HOSTED_TARGET_LABEL: ${{ vars.TARGET_LABEL }}
        run: |
          if [ -f "${TUSK_HOSTED_CLEANUP_MANIFEST}" ]; then
            timeout --signal=TERM --kill-after=5s 40s \
              bun scripts/cleanup-hosted-provider.ts \
              "${PROVIDER}" \
              "${TUSK_HOSTED_CLEANUP_MANIFEST}"
          else
            echo "No cleanup manifest was authorized; no database cleanup attempted"
          fi

      - name: Write evidence summary
        if: success()
        shell: bash
        run: |
          evidence="$(find artifacts/hosted -maxdepth 1 -name 'evidence-*.json' -print -quit)"
          {
            echo '## Hosted PostgreSQL evidence'
            echo
            echo "- Provider: $(jq -r .provider "${evidence}")"
            echo "- Region: $(jq -r .region "${evidence}")"
            echo "- Source SHA: $(jq -r .source.commit "${evidence}")"
            echo "- Candidate SHA-256: $(jq -r .source.artifactSha256 "${evidence}")"
            echo "- PostgreSQL: $(jq -r .target.serverVersion "${evidence}")"
            echo "- Cleanup verified: $(jq -r .cleanup.verified "${evidence}")"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload immutable candidate
        if: always() && steps.candidate.outputs.tarball != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hosted-candidate-${{ inputs.provider }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.candidate.outputs.tarball }}
          if-no-files-found: error
          retention-days: 90

      - name: Upload redacted provider evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hosted-evidence-${{ inputs.provider }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/hosted/evidence-*.json
          if-no-files-found: error
          retention-days: 90
